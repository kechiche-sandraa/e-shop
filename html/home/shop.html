        ></script>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const items = Array.from(document.querySelectorAll('.product-card'));
                const perPage = 4; // 4 items per page (4 columns)
                const pages = Math.ceil(items.length / perPage);
                const pagination = document.getElementById('pagination');

                function renderPage(page) {
                    const start = (page - 1) * perPage;
                    const end = start + perPage;
                    items.forEach((el, idx) => {
                        el.classList.toggle('d-none', idx < start || idx >= end);
                    });
                    // update active state
                    Array.from(pagination.querySelectorAll('li')).forEach((li, i) => {
                        li.classList.toggle('active', i === page - 1);
                    });
                }

                // build pagination
                for (let i = 1; i <= pages; i++) {
                    const li = document.createElement('li');
                    li.className = 'page-item' + (i === 1 ? ' active' : '');
                    const a = document.createElement('a');
                    a.className = 'page-link';
                    a.href = '#';
                    a.textContent = i;
                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        renderPage(i);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });
                    li.appendChild(a);
                    pagination.appendChild(li);
                }

                // initial render
                renderPage(1);
            });
        </script>
